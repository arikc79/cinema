services:
  - type: web
    name: cinema
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn My_first.wsgi:application
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cinema-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: cinema-db
    databaseName: cinema
    user: cinema
